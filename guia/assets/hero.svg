<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420">
  <rect width="640" height="420" fill="#0a0a0e"/>
  <rect x="0" y="0" width="640" height="34" fill="#16161e"/>
  <circle cx="18" cy="17" r="6" fill="#f24c4c"/>
  <circle cx="38" cy="17" r="6" fill="#f2b84c"/>
  <circle cx="58" cy="17" r="6" fill="#4cf28c"/>
  <text x="320" y="22" fill="#6f6f7c" font-family="monospace" font-size="12" text-anchor="middle">agent-browser</text>
  <g font-family="monospace" font-size="15" fill="#d6d6e0">
    <text x="20" y="70"><tspan fill="#E2A23B">$</tspan> agent-browser open example.com</text>
    <text x="20" y="98" fill="#6f6f7c">Navigated to https://example.com</text>
    <text x="20" y="134"><tspan fill="#E2A23B">$</tspan> agent-browser snapshot -i</text>
    <text x="20" y="162" fill="#9ece6a">- heading "Example Domain" [ref=e1]</text>
    <text x="20" y="184" fill="#9ece6a">- link "Learn more" [ref=e4]</text>
    <text x="20" y="220"><tspan fill="#E2A23B">$</tspan> agent-browser click @e4</text>
    <text x="20" y="248" fill="#6f6f7c">Clicked element [ref=e4]</text>
    <text x="20" y="284"><tspan fill="#E2A23B">$</tspan> agent-browser screenshot page.png</text>
    <text x="20" y="312" fill="#6f6f7c">Saved screenshot to page.png</text>
  </g>
  <rect x="0" y="0" width="640" height="420" fill="none" stroke="#272730" stroke-width="1"/>
</svg>
